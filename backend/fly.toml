app = "mailchef-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  context = ".."

[env]
MAILCHEF_DATA_DIR = "/data"
PORT = "8080"

[[mounts]]
source = "mailchef_data"
destination = "/data"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
